# docker-compose.dev.yml
# ---------------------------------------------------------------------------
# Windows development infrastructure: Redis + PostgreSQL only.
#
# The ai-dev-platform application services (API, orchestrator, agents) are
# started natively by start.ps1 rather than in containers.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d    # start
#   docker compose -f docker-compose.dev.yml down      # stop + remove
#   docker compose -f docker-compose.dev.yml down -v   # stop + delete volumes
# ---------------------------------------------------------------------------

version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: aidev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidevplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aidevplatform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aidev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
